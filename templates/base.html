<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Order Management{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 12px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 12px;
        }

        th, td {
            border: 1px solid #000;
            padding: 6px 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f2f2f2;
        }

        form {
            margin-bottom: 12px;
        }

        input, select, textarea, button {
            margin: 2px 0;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
        }

        .messages {
            margin: 12px 0;
        }

        .messages div {
            border: 1px solid #000;
            padding: 6px 8px;
            margin-bottom: 6px;
        }

        .top-nav {
            margin-bottom: 16px;
        }

        .top-nav form {
            display: inline;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="top-nav">
        {% if user.is_authenticated %}
            Logged in as: {{ user.name }} ({{ user.role }})
            |
            <a href="{% url 'orders:dashboard' %}">Dashboard</a>
            <a href="{% url 'orders:order_list' %}">Orders</a>
            <a href="{% url 'orders:order_create' %}">Create order</a>
            <a href="/admin/">Admin</a>

            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </div>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div>{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
